services:
  postgres:
    image: imresamu/postgis:16-3.5
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: utilitix
      POSTGRES_PASSWORD: utilitix
      POSTGRES_DB: utilitix
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U utilitix -d utilitix"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
